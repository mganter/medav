version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions used by the CI and release workflows. Keeps the
  # commit-SHA-pinned actions current (Dependabot updates the SHA and the
  # version comment together).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # The container base image referenced in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
