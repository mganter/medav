name: ci

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs on the same ref to save CI time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Supply-chain note: actions are pinned to major-version tags for readability.
# For stronger integrity, pin each to a full commit SHA and bump via Dependabot.
jobs:
  test:
    name: build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race ./...

  integration:
    name: integration tests
    runs-on: ubuntu-latest # Docker is preinstalled, so testcontainers works
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # Spins up a throwaway PostgreSQL via testcontainers (needs the Docker
      # daemon); gated behind the `integration` build tag.
      - name: Integration tests
        run: go test -tags=integration ./internal/storage/...
