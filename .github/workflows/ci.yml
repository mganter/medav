name: ci

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel superseded runs on the same ref to save CI time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Supply-chain note: actions are pinned to full commit SHAs (with the version as
# a trailing comment) so a moved tag cannot alter CI. Dependabot
# (.github/dependabot.yml) bumps the SHAs and comments.
jobs:
  test:
    name: build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race ./...

  integration:
    name: integration tests
    runs-on: ubuntu-latest # Docker is preinstalled, so testcontainers works
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      # Spins up a throwaway PostgreSQL via testcontainers (needs the Docker
      # daemon); gated behind the `integration` build tag.
      - name: Integration tests
        run: go test -tags=integration ./internal/storage/...
