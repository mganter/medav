name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR
  id-token: write # keyless (OIDC) cosign signing of artifacts and images

# Supply-chain note: third-party actions below are pinned to major-version tags
# for readability. For stronger integrity, pin each to a full commit SHA (with
# the version as a trailing comment) and let Dependabot bump them.
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 # cross-build arm64 images

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install Cosign (artifact/image signing)
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
