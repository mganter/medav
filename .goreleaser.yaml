# GoReleaser configuration (schema v2). See https://goreleaser.com
# Images are published to ghcr.io/mganter/medav (derived from the git remote).
version: 2

project_name: medav

before:
  hooks:
    - go mod tidy

builds:
  - id: medav
    main: ./cmd/medav
    binary: medav
    env:
      - CGO_ENABLED=0 # static binary required for distroless/static
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: medav
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

# CycloneDX-style SBOMs (via Syft) record exactly which dependencies shipped in
# each release archive, so a future CVE can be traced to affected artifacts.
sboms:
  - id: archive
    artifacts: archive

# Keyless (OIDC) cosign signature over the checksums file. Verifying the
# checksums verifies every artifact listed in it. Requires id-token: write.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Multi-arch image built with buildx; the manifest is assembled automatically.
dockers_v2:
  - id: medav
    ids:
      - medav
    images:
      - "ghcr.io/mganter/medav"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

# Keyless cosign signatures over the published images (by digest), so consumers
# can `cosign verify ghcr.io/mganter/medav:<tag>` to confirm provenance.
docker_signs:
  - cmd: cosign
    args:
      - sign
      - "--yes"
      - "${artifact}"
    artifacts: images
    output: true
